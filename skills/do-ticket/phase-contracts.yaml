# phase-contracts.yaml — formal contracts for every do-ticket phase
#
# Replaces the static prerequisite table in do-ticket/SKILL.md.
# do-ticket uses this to:
#   1. Validate inputs before invoking a child skill
#   2. Verify outputs after the skill returns
#   3. Detect stale state (output exists but inputs changed since)
#   4. Compute "earliest missing phase" when user requests a jump
#
# Path conventions:
#   {ticket_dir}   = {output}/tickets/<TICKET_ID>/
#   {project_docs} = public-project-docs/<active-project>/
#   Plain filename = relative to {ticket_dir}
#   "ctx.<key>" = field in ticket-context.yaml
#   "state.<key>" = field in ticket-state.yaml
#
# Stale-check convention (phases with scan-init artifacts):
#   Before invoking, read {project_docs}/_index.yaml → phase_readiness[N].ready
#   If false → G10 block; surface missing[] list; options: rescan / skip / abort
#   Stale-check note on each phase lists the readiness gate ID.

contracts:

  branch:                               # Phase 1
    skill: do-ticket internal
    inputs:
      required:
        - "projects.md (active project + repos + base_branch)"
      optional: []
    outputs:
      - "ticket-state.yaml (created)"
      - "ticket-context.yaml (created with resolved.* + fingerprints)"
    state_writes:
      phase: branch
      branch: <TICKET_ID>
      base_branch: <from projects.md>

  classify:                             # Phase 2
    skill: do-ticket internal
    inputs:
      required:
        - "ticket-context.yaml (resolved.*)"
      optional:
        - "Jira ticket metadata (issue_type, labels, components)"
    outputs:
      - "ticket-context.yaml (+ ticket_type, risk_profile, risk_factors)"
    state_writes:
      phase: classify
    user_gate:
      "Confirm or override auto-classified ticket_type"

  rebase-check:                         # Phase 4
    skill: do-ticket internal
    inputs:
      required:
        - "git working tree"
        - "state.base_branch"
    outputs:
      - "(no file output; may rebase or block on conflict)"
    state_writes:
      phase: rebase-check  # or 'blocked' on conflict
    failure_modes: [FM-REBASE-CONFLICT, FM-LARGE-DIVERGENCE]

  requirements:                         # Phase 5
    skill: jira-to-requirements
    inputs:
      required:
        - "ticket-context.yaml"
        - "ctx.jira_prefix (project field)"
        - "Jira API access"
      optional:
        - "requirements.md (existing — for update mode)"
    outputs:
      - "requirements.md"
      - "ticket-context.yaml (+ jira.fetched_at, jira.comment_count, fingerprints.requirements_sha)"
    state_writes:
      phase: requirements
    update_cycle: "On update_count > 0, write requirements-vN-diff.md and confirm with user"

  analyze:                              # Phase 6 (sub-steps: 6a context-expansion → 6b analyze-requirements → 6c flow-gate)
    skill: analyze-requirements
    strategy_registry: analyze-requirements/strategies.yaml
    readiness_gate: 6
    inputs:
      required:
        - "requirements.md"
        - "ticket-context.yaml"
        - "{project_docs}/code/domain_index.yaml"
      optional:
        - "{project_docs}/domain/_index.yaml (if status: fresh — entity registry)"
        - "{project_docs}/domain/_glossary.yaml (if exists — term definitions)"
        - "{project_docs}/db/db_index.yaml (if status: fresh — column types, FK constraints, enums)"
        - "{project_docs}/incidents/incidents.yaml (if status: fresh — consumed in step 6a to filter past incidents matching ticket scope)"
        - "{project_docs}/topology/topology.yaml (if status: fresh — consumed in step 6a to surface relevant cross-repo queues + health flags)"
        - "{project_docs}/flows/flow_index.yaml (if status: fresh — consumed in step 6c to detect business flows touched by this ticket and gate to DPS flow-trace before plan)"
    outputs:
      - "context-expansion.md (only if incidents.yaml OR topology.yaml exists AND not skipped per step 6a rules)"
      - "requirements-analysis.md (or behavior-spec.md for refactor strategy)"
      - "ticket-context.yaml (+ domain_entities_in_scope, complexity_flags, context_expansion.*, flow_gate.*)"
      - "dps-briefing.md (ONLY when step 6c gate fires AND user chooses 'route to DPS')"
    state_writes:
      phase: analyze                  # OR phase: awaiting_dps if 6c gate fires + user chose route
    blocks_on:
      - "open questions"
      - "dependent ticket not done (FM-DEPENDENT-TICKET-NOT-DONE)"
      - "physical impossibility"
      - "ambiguous shared term"
      - "flow-gate (6c) — user chose route-to-DPS → state: awaiting_dps; resume via do-ticket <ID> --from-dps=<session>"
      - "flow-gate (6c) — user chose manual block → state: blocked"
    stale_check: "phase_readiness[6] — requires code artifact fresh; flow gate degrades gracefully if flow_index.yaml missing"
    sub_steps:
      - "6a context-expansion (do-ticket internal): filter incidents/topology by ticket scope → write context-expansion.md. Skipped if both artifacts missing OR ticket_type ∈ {doc-only, hotfix} OR --from-dps mode. See do-ticket/SKILL.md Phase 6 step 6a for algorithm."
      - "6b analyze-requirements (skill invocation): runs as before, with context-expansion.md (if present) passed as pre-context hint alongside requirements.md."
      - "6c flow-gate (do-ticket internal): read {project_docs}/flows/flow_index.yaml; match flow keywords + entity references from requirements + analysis against flow_index; if any matched flow has health != ok OR known_gates non-empty OR complexity == high → G10 prompt route/skip/block. Route → write dps-briefing.md + set state phase: awaiting_dps. Skip → inject warning into ctx.plan_warnings[] for implement-plan to surface. Skipped entirely if --from-dps mode (DPS already provided context), or if ticket_type ∈ {doc-only, hotfix, spike}, or if state.flow_gate_decided already true. See do-ticket/SKILL.md Phase 6 step 6c for full algorithm."

  invariant-scope:                      # Phase 7
    skill: invariant-check (--pre)
    readiness_gate: 7
    inputs:
      required:
        - "requirements-analysis.md"
        - "ticket-context.yaml"
        - "{project_docs}/domain/_index.yaml"
      optional:
        - "{project_docs}/domain/<Entity>.yaml (one per entity in domain_entities_in_scope)"
        - "{project_docs}/domain/_maturity.yaml"
    outputs:
      - "invariants_in_scope.yaml"
      - "ticket-context.yaml (+ invariants_in_scope)"
    state_writes:
      phase: invariant-scope
    skip_when:
      - "ticket_type ∈ {doc-only, hotfix, refactor}"
      - "no entity in domain_entities_in_scope has a domain shard"
    stale_check: "phase_readiness[7] — requires domain artifact fresh"

  test-cases:                           # Phase 8
    skill: write-test-cases
    strategy_registry: write-test-cases/strategies.yaml
    inputs:
      required:
        - "requirements-analysis.md (or behavior-spec.md)"
        - "ticket-context.yaml"
      optional:
        - "requirements.md (fallback if analysis missing — bug-repro-only path)"
    outputs:
      - "test-cases.md"
    state_writes:
      phase: test-cases
    user_gate:
      "Show count + offer edit before proceeding"
    cross_check: "Every 'must not / cannot / reject when' constraint in analysis has ≥1 negative case"

  plan:                                 # Phase 9
    skill: implement-plan
    readiness_gate: 9
    inputs:
      required:
        - "requirements.md"
        - "requirements-analysis.md (or behavior-spec.md)"
        - "test-cases.md"
        - "ticket-context.yaml"
        - "{project_docs}/code/domain_index.yaml"
      optional:
        - "{project_docs}/patterns/_index.yaml (if exists — for pattern injection; auto-induction fallback)"
        - "{project_docs}/db/db_index.yaml (if status: fresh — table shapes for migration planning)"
        - "{project_docs}/build/test.yaml (test project paths + run commands)"
        - "context-expansion.md (if produced by step 6a — read for past-incident lessons + relevant queue topology before forming the plan)"
        - "update-implement-vN.md (update mode)"
        - "invariants_in_scope.yaml"
        - "ctx.flow_findings.* (when ticket resumed via --from-dps — flow_map per trigger path, gaps, decisions hydrated from DPS investigation-findings.md; primary input to plan when present)"
        - "ctx.plan_warnings[] (when Phase 6c flow-gate was bypassed — risky flows + known gates + keyword hits that the plan must explicitly address or note as accepted risk)"
    outputs:
      - "plan.md"
      - "ticket-context.yaml (+ pattern_matches, resolved.touched_files, resolved.test_project_paths, fingerprints.plan_sha)"
    state_writes:
      phase: plan
      plan_written_at: <iso>
    blocks_on:
      - "flagged risks requiring decision (G1)"
      - "domain_index missing entries (G1)"
    stale_check: "phase_readiness[9] — requires code + build artifacts fresh"
    lite_mode:
      when: "ticket_type ∈ {bugfix-small, hotfix}"
      output: "plan.md (≤1 page: file + method + 1-line description)"

  fe-impact-check:                      # Phase 9.5 — lazy FE compatibility gate (post-plan)
    readiness_gate: 9                   # piggybacks plan readiness; no separate scan-init dep
    inputs:
      required:
        - "plan.md"
        - "ticket-context.yaml"
      optional:
        - "{project_docs}/scan-api-docs/gateway_api_docs.yaml (for FE-consumed endpoint detection)"
    preconditions:
      skip_if: "ticket_type ∈ {fe-only, doc-only, hotfix, refactor, spike} OR plan changes no public API endpoint OR all affected endpoints are admin/internal (no FE caller)"
    algorithm:
      - "Extract affected_endpoints[] + proposed shape/cardinality/status-code changes from plan.md"
      - "Quick FE-consumer check: grep FE repo for each endpoint URL → if none consumed → skip (write fe-impact-check.md with verdict SKIPPED, no callers)"
      - "Otherwise spawn narrow Explore sub-agent with BE plan context (proposed shape, cardinality, status codes) + targeted FE grep scope (only affected endpoints)"
      - "Sub-agent checks: FE response handling logic, current cardinality usage at call site, i18n keys needed for new error/status values, store/component coupling that would break"
      - "Sub-agent returns: conflicts[] (file:line + nature) + verdict ∈ {SAFE, NEEDS_FE_CHANGE, NEEDS_BE_ADJUST}"
      - "Write fe-impact-check.md to ticket folder"
    outputs:
      - "tickets/{ID}/fe-impact-check.md"
    state_writes:
      phase: fe-impact-check
      fe_impact_decision: SAFE | NEEDS_FE_CHANGE | NEEDS_BE_ADJUST | SKIPPED
    blocks_on:
      - "NEEDS_BE_ADJUST → loop back to Phase 9 plan to reconcile (G1)"
      - "NEEDS_FE_CHANGE → G1 surface to user: file follow-up FE ticket OR ack as known gap and continue"
    stale_check: "no scan-init dependency — lazy scan at runtime, always fresh per ticket"

  unit-tests:                           # Phase 10
    skill: write-unit-tests
    readiness_gate: 10
    inputs:
      required:
        - "plan.md"
        - "test-cases.md"
        - "ticket-context.yaml"
        - "{project_docs}/build/test.yaml (test project paths, base class, run command)"
      optional: []
    outputs:
      - "Unit test files (RED) in test project"
      - "unit-tests-written.md"
    state_writes:
      phase: unit-tests
    blocks_on:
      - "false-green tests (FM-FALSE-GREEN-TEST)"
      - "build failure (FM-DLL-LOCKED, others)"
    stale_check: "phase_readiness[10] — requires build artifact fresh"
    fe_mode:
      when: "ticket_type=fe-only OR FE files in resolved.touched_files"
      additional_outputs:
        - "Jest/Karma .spec.ts files"
        - "Storybook .stories.ts for UI changes"

  implement:                            # Phase 11
    skill: implement
    strategy_registry: implement/strategies.yaml
    inputs:
      required:
        - "plan.md"
        - "unit-tests-written.md"
        - "ticket-context.yaml"
      optional:
        - "implement-log.md (resume mode)"
        - "update-implement-vN.md (update mode)"
    outputs:
      - "Source code changes"
      - "implement-log.md"
      - "implement-summary.md (must include 'Regression check: PASS')"
      - "ticket-context.yaml (+ strategies_picked.implement)"
    state_writes:
      phase: implement
    failure_modes: [FM-3X-SAME-ROOT, FM-LAYER-VIOLATION, FM-FALSE-GREEN-TEST]
    blocks_on:
      - "DB migration required (G3)"
      - "3+ same-root failures (G8)"
      - "domain layer importing infrastructure (FM-LAYER-VIOLATION)"

  regression:                           # Phase 12
    skill: do-ticket internal (verifies implement-summary)
    readiness_gate: 12
    inputs:
      required:
        - "implement-summary.md"
      optional:
        - "{project_docs}/build/test.yaml (test run command — used to re-run suite before confirming PASS)"
    outputs:
      - "(verification only — no file)"
    state_writes:
      phase: regression
    blocks_on:
      - "implement-summary missing 'Regression check: PASS'"
      - "FM-PLAN-CHANGESET-DRIFT (files in diff not in plan)"
    stale_check: "phase_readiness[12] — requires build artifact fresh"

  env-gate:                             # Phase 14
    skill: do-ticket internal
    readiness_gate: 14
    inputs:
      required:
        - "implement-summary.md"
        - "explicit user confirmation that services are running"
        - "{project_docs}/build/run.yaml (service list, ports, dependencies)"
      optional: []
    outputs:
      - "(no file)"
    state_writes:
      phase: env-gate
    user_gate:
      "List required services from build/run.yaml + wait for confirmation"
    stale_check: "phase_readiness[14] — requires build artifact fresh"

  api-test:                             # Phase 15
    skill: learn-crud
    strategy_registry: learn-crud/strategies.yaml
    inputs:
      required:
        - "ticket-context.yaml"
        - "implement-summary.md"
        - "running services (env-gate confirmed)"
      optional:
        - "{project_docs}/api/gateway_api_docs.yaml (if status: fresh — produced by scan-api-docs; stale check: compare fingerprint vs gateway controller source SHA)"
    outputs:
      - "Updated entity YAMLs in public-project-docs/<project>/api/entities/"
      - "Postman collection synced"
      - "ticket-context.yaml (+ strategies_picked.learn-crud)"
    state_writes:
      phase: api-test
    failure_modes: [FM-SILENT-API-BUG, FM-WRONG-ENV-PROFILE]
    skip_when:
      - "strategy = skip"
      - "ticket_type ∈ {doc-only}"

  commit:                               # Phase 16
    skill: do-ticket internal
    inputs:
      required:
        - "implement-summary.md"
        - "All tests green (unit + api-test)"
        - "explicit user confirmation"
      optional: []
    outputs:
      - "git commit (only files from implement-summary.md)"
    state_writes:
      phase: commit
    user_gate:
      "Show proposed message + file list, wait for y/n"
    invariants:
      - "Never use git add -A — only stage explicit files"
      - "Commit format: <TICKET_ID>: short description"

  pre-push:                             # Phase 17
    skill: do-ticket internal
    readiness_gate: 17
    inputs:
      required:
        - "Latest commit"
        - "{project_docs}/conventions/security.yaml (secret regex patterns, auth-endpoint patterns)"
      optional: []
    outputs:
      - "(scan results in chat)"
    state_writes:
      phase: pre-push
    failure_modes: [FM-SECRETS-IN-DIFF, FM-UNPROTECTED-ENDPOINT, FM-MIGRATION-DOWN-EMPTY]
    hard_stops_on: [FM-SECRETS-IN-DIFF, FM-UNPROTECTED-ENDPOINT]
    stale_check: "phase_readiness[17] — requires conventions artifact fresh"

  ci-check:                             # Phase 18
    skill: do-ticket internal
    readiness_gate: 18
    inputs:
      required:
        - "{project_docs}/conventions/ci.yaml (CI provider, workflow paths, version bump strategy)"
      optional: []
    outputs:
      - "(verification only)"
    state_writes:
      phase: ci-check
    failure_modes: [FM-CI-FAILURE]
    stale_check: "phase_readiness[18] — requires conventions artifact fresh"

  invariant-encoded:                    # Phase 19
    skill: invariant-check (--post)
    readiness_gate: 19
    inputs:
      required:
        - "Latest commit (git diff)"
        - "invariants_in_scope.yaml"
      optional:
        - "{project_docs}/domain/<Entity>.yaml (one per entity in scope — for maturity update)"
        - "{project_docs}/domain/_maturity.yaml"
    outputs:
      - "invariants_encoded.yaml"
      - "{project_docs}/domain/_maturity.yaml (updated — bump tier if newly enforced in code)"
    state_writes:
      phase: invariant-encoded
    skip_when:
      - "invariant-scope was skipped"
    stale_check: "phase_readiness[19] — requires domain artifact fresh"

  qa-checklist:                         # Phase 20
    skill: qa-checklist
    inputs:
      required:
        - "requirements.md"
        - "implement-summary.md"
        - "ticket-context.yaml"
      optional: []
    outputs:
      - "qa-checklist.md"
    state_writes:
      phase: qa-checklist
    skip_when:
      - "ticket_type ∈ {refactor, hotfix, doc-only, migration-only, spike}"

  pr-ready:                             # Phase 21
    skill: pr-description
    readiness_gate: 21
    inputs:
      required:
        - "plan.md"
        - "implement-summary.md"
        - "ticket-context.yaml"
        - "{project_docs}/conventions/git.yaml (branch naming, commit format)"
        - "{project_docs}/conventions/ci.yaml (version bump strategy — used to set PR title prefix)"
      optional:
        - "invariants_encoded.yaml"
    outputs:
      - "pr-description.md"
    state_writes:
      phase: pr-ready
    user_gate:
      "Show PR description + wait for y/n before gh pr create"
    stale_check: "phase_readiness[21] — requires conventions artifact fresh"

  pr-review:                            # Phase 22
    skill: handle-pr-review
    inputs:
      required:
        - "PR comments (pasted or fetched)"
        - "ticket-context.yaml"
      optional: []
    outputs:
      - "update-implement.md"
      - "pr-review-log.md"
      - "split-plan.md (if split requested)"
    state_writes:
      phase: pr-review
    triggers_re_run: "Phases 5-13 re-run in update mode"

  done:                                 # Phase 23
    skill: do-ticket internal
    inputs:
      required: []
      optional: []
    outputs:
      - "Final summary in chat"
      - "run-telemetry.yaml (closed out)"
    state_writes:
      phase: done

# Phase order is determined by ticket_type (see do-ticket/ticket-types.md).
# This file defines WHAT each phase contracts; ticket-types.md defines WHICH
# phases run for a given ticket type.

# How do-ticket uses this file:
#
# 1. Before invoking phase X:
#    - Load contracts.<X>
#    - Verify every input in contracts.<X>.inputs.required exists and matches fingerprint
#    - If missing → FM-PREREQ-MISSING → suggest earliest phase that produces missing input
#
# 2. After phase X returns:
#    - Verify every file in contracts.<X>.outputs was produced
#    - Verify state_writes happened
#    - Compute fingerprints for any new file → write to ticket-context.fingerprints
#
# 3. On phase jump request (do-ticket TICKET phase=X):
#    - Walk contracts backward from X computing missing inputs
#    - Earliest phase with missing input = entry point
#    - Offer: "Run from <entry> instead of <X>?"
#
# 4. On staleness:
#    - For any phase with completed output, check inputs' current SHAs vs fingerprints
#    - If drift → FM-FINGERPRINT-STALE → offer regen of dependent outputs
